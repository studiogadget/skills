repos:
  # Standard hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements

  # Python formatting and linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.7
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix, --config=pyproject.toml]
      - id: ruff-format

  # Type checking
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        files: ^src/
        types: [python]

  # Security
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]

  # Dependency vulnerability scanning
  - repo: https://github.com/pypa/pip-audit
    rev: v2.9.0
    hooks:
      - id: pip-audit
        # args: [--desc, --fix]
        args: [--desc, --fix, --ignore-vuln, "GHSA-5239-wwwm-4pmq"]

  # textlint
  # - repo: https://github.com/studiogadget/textlint-with-pre-commit
  #   rev: v15.2.1
  #   hooks:
  #     - id: textlint
  #       # args: [--fix]  # 意図しない修正を防ぐため自動修正は無効化
  #       files: \.(markdown|md)$
  #       additional_dependencies:
  #         - "textlint-filter-rule-comments"
  #         - "textlint-filter-rule-allowlist"
  #         - "textlint-rule-prh"
  #         - "textlint-rule-preset-ja-technical-writing"
  #         - "textlint-rule-preset-ja-spacing"

  # gitleaks
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks
        name: gitleaks detect
        # Gitリポジトリーとしてスキャンし、.gitignoreで除外されたファイルは対象外にする
        entry: gitleaks detect -v --redact --source .
        language: golang
        types: [file]
        pass_filenames: false
        # args: [--config=.gitleaks.toml]  # カスタムルールを使う場合は有効化
